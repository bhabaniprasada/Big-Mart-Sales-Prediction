
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Big Mart Sales Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
            font-family:'Segoe UI',sans-serif;
        }

        .card{
            width:100%;
            max-width:800px;
            border:none;
            border-radius:20px;
            background:rgba(255,255,255,.18);
            backdrop-filter:blur(15px);
            box-shadow:0 15px 40px rgba(0,0,0,.25);
            padding:35px;
        }

        h1{
            text-align:center;
            color:white;
            font-weight:bold;
            margin-bottom:30px;
        }

        label{
            font-weight:600;
            color:#fff;
        }

        .form-control,.form-select{
            border-radius:12px;
            padding:12px;
            border:none;
            box-shadow:none;
        }

        .form-control:focus,
        .form-select:focus{
            box-shadow:0 0 10px rgba(255,255,255,.5);
        }

        .btn-submit{
            background:#28a745;
            border:none;
            border-radius:50px;
            padding:12px 35px;
            font-size:18px;
            transition:.3s;
        }

        .btn-submit:hover{
            transform:scale(1.05);
            background:#218838;
        }

        .btn-reset{
            border-radius:50px;
            padding:12px 35px;
            font-size:18px;
        }

        @media(max-width:768px){
            .card{
                padding:20px;
            }
        }
    </style>

</head>

<body>

<div>

<h1>🛒 Big Mart Sales Prediction</h1>

<div class="card">

<form action="/predict" method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label>Item Weight</label>
<input type="number" step="0.01" class="form-control" name="item_weight" required>
</div>

<div class="col-md-6 mb-3">
<label>Item Fat Content</label>
<select class="form-select" name="item_fat_content">
<option value="1">Low Fat</option>
<option value="2">Regular</option>
<option value="0">High Fat</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Item Visibility</label>
<input type="number" step="0.001" class="form-control" name="item_visibility" required>
</div>

<div class="col-md-6 mb-3">
<label>Item Type</label>
<select class="form-select" name="item_type">

<option value="0">Baking Goods</option>
<option value="1">Breads</option>
<option value="2">Breakfast</option>
<option value="3">Canned</option>
<option value="4">Dairy</option>
<option value="5">Frozen Foods</option>
<option value="6">Fruits & Vegetables</option>
<option value="7">Hard Drinks</option>
<option value="8">Health & Hygiene</option>
<option value="9">Household</option>
<option value="10">Meat</option>
<option value="11">Others</option>
<option value="12">Seafood</option>
<option value="13">Snack Foods</option>
<option value="14">Soft Drinks</option>
<option value="15">Starchy Foods</option>

</select>
</div>

<div class="col-md-6 mb-3">
<label>Item MRP</label>
<input type="number" step="0.01" class="form-control" name="item_mrp" required>
</div>

<div class="col-md-6 mb-3">
<label>Outlet Establishment Year</label>
<input type="number" class="form-control" name="outlet_establishment_year" placeholder="YYYY" required>
</div>

<div class="col-md-4 mb-3">
<label>Outlet Size</label>
<select class="form-select" name="outlet_size">
<option value="0">High</option>
<option value="1">Medium</option>
<option value="2">Small</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Outlet Location</label>
<select class="form-select" name="outlet_location_type">
<option value="0">Tier 1</option>
<option value="1">Tier 2</option>
<option value="2">Tier 3</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Outlet Type</label>
<select class="form-select" name="outlet_type">
<option value="0">Grocery Store</option>
<option value="1">Supermarket Type 1</option>
<option value="2">Supermarket Type 2</option>
<option value="3">Supermarket Type 3</option>
</select>
</div>

</div>

<div class="text-center mt-4">

<button class="btn btn-success btn-submit">
Predict Sales
</button>

<button type="reset" class="btn btn-outline-light btn-reset ms-2">
Reset
</button>

</div>

</form>

</div>

</div>

</body>
</html>
